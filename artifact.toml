kind = "web"
previewPath = "/"
title = "Rozcestník"
version = "1.0.0"
id = "artifacts/rozcestnik"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23975

[services.development]
run = "pnpm --filter @workspace/rozcestnik run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rozcestnik", "run", "build" ]
publicDir = "artifacts/rozcestnik/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23975"
BASE_PATH = "/"
